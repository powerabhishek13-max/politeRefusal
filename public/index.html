<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <button class="btn-icon hamburger-btn" id="sidebarToggle" title="Team members" aria-label="Toggle team members">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
          <rect x="2" y="3.5" width="14" height="1.5" rx="1"/>
          <rect x="2" y="8.25" width="14" height="1.5" rx="1"/>
          <rect x="2" y="13" width="14" height="1.5" rx="1"/>
        </svg>
      </button>
      <div class="app-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="#0052CC"/>
          <rect x="5" y="5" width="7" height="10" rx="2" fill="white"/>
          <rect x="5" y="17" width="7" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
          <rect x="14" y="5" width="9" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
          <rect x="14" y="13" width="9" height="10" rx="2" fill="white"/>
        </svg>
        <span class="app-name">TaskFlow</span>
      </div>
    </div>
    <div class="header-right">
      <label class="acting-as-label">Acting as:</label>
      <select id="currentUserSelect" class="acting-as-select">
        <option value="">— Select user —</option>
      </select>
    </div>
  </header>

  <!-- ── SIDEBAR BACKDROP (mobile) ──────────────────────────────────── -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- ── MAIN LAYOUT ─────────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar: Team Members -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Team Members</h2>
        <button class="btn-icon" id="toggleAddMember" title="Add member">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/>
          </svg>
        </button>
      </div>

      <!-- Add member form -->
      <div class="add-member-form" id="addMemberForm" style="display:none">
        <input type="text" id="newMemberName" class="form-input" placeholder="Member name" maxlength="50" />
        <div class="color-picker-row">
          <span class="color-picker-label">Avatar color:</span>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary btn-sm" id="addMemberBtn">Add Member</button>
          <button class="btn btn-ghost btn-sm" id="cancelAddMember">Cancel</button>
        </div>
      </div>

      <!-- Members list -->
      <ul class="members-list" id="membersList"></ul>
    </aside>

    <!-- Kanban Board -->
    <main class="board-container">
      <div class="board" id="board"></div>
    </main>

  </div>

  <!-- ── TASK MODAL ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="taskModal">
      <div class="modal-header">
        <div class="modal-title-row">
          <span class="modal-status-badge" id="modalStatusBadge"></span>
          <button class="btn-icon modal-close" id="modalClose" title="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/>
            </svg>
          </button>
        </div>
        <input type="text" class="modal-title-input" id="modalTitle" placeholder="Task title…" />
      </div>

      <div class="modal-body">
        <div class="modal-columns">
          <!-- Left: Details -->
          <div class="modal-details">
            <div class="field-group">
              <label class="field-label">Description</label>
              <textarea class="form-textarea" id="modalDescription" placeholder="Add a description…" rows="4"></textarea>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Assignee</label>
                <select class="form-select" id="modalAssignee">
                  <option value="">Unassigned</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label">Deadline</label>
                <input type="date" class="form-input" id="modalDeadline" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label">Status</label>
              <select class="form-select" id="modalStatus">
                <option value="not_started">Not Started</option>
                <option value="wip">WIP</option>
                <option value="stuck">Stuck &amp; Need Support</option>
                <option value="delayed">Delayed</option>
                <option value="completed">Completed</option>
                <option value="parked">Parked</option>
              </select>
            </div>

            <div class="modal-meta" id="modalMeta"></div>
          </div>

          <!-- Right: Comments -->
          <div class="modal-comments-panel">
            <h3 class="comments-heading">Comments</h3>
            <div class="comments-list" id="commentsList"></div>
            <div class="add-comment-form">
              <div class="comment-input-row">
                <div class="comment-author-avatar" id="commentAuthorAvatar"></div>
                <textarea
                  class="comment-textarea"
                  id="commentInput"
                  placeholder="Write a comment…"
                  rows="2"
                ></textarea>
              </div>
              <div class="form-actions" style="justify-content: flex-end;">
                <button class="btn btn-primary btn-sm" id="submitComment">Post Comment</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="deleteTaskBtn">Delete Task</button>
        <div class="modal-footer-right">
          <button class="btn btn-ghost btn-sm" id="cancelModal">Cancel</button>
          <button class="btn btn-primary btn-sm" id="saveTaskBtn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ADD TASK MODAL ───────────────────────────────────────────────── -->
  <div class="modal-overlay" id="addTaskOverlay" style="display:none">
    <div class="modal modal-sm" id="addTaskModal">
      <div class="modal-header">
        <h3 class="modal-heading">Add New Task</h3>
        <button class="btn-icon modal-close" id="addTaskClose">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Title <span class="required">*</span></label>
          <input type="text" class="form-input" id="addTaskTitle" placeholder="What needs to be done?" maxlength="200" />
        </div>
        <div class="field-group">
          <label class="field-label">Description</label>
          <textarea class="form-textarea" id="addTaskDescription" placeholder="Add more details…" rows="3"></textarea>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Assignee</label>
            <select class="form-select" id="addTaskAssignee">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Deadline</label>
            <input type="date" class="form-input" id="addTaskDeadline" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Status</label>
          <select class="form-select" id="addTaskStatus">
            <option value="not_started">Not Started</option>
            <option value="wip">WIP</option>
            <option value="stuck">Stuck &amp; Need Support</option>
            <option value="completed">Completed</option>
            <option value="parked">Parked</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <span></span>
        <div class="modal-footer-right">
          <button class="btn btn-ghost btn-sm" id="cancelAddTask">Cancel</button>
          <button class="btn btn-primary btn-sm" id="confirmAddTask">Create Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ────────────────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
